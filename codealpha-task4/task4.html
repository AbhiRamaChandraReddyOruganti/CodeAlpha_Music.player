<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <link rel="stylesheet" href="task4.css">
</head>
<body>

<div class="player">

    <h2>Music Player</h2>

    <div class="song-info">
        <h3 id="songTitle">Song 1</h3>
    </div>

    <audio id="audio" src="audio.mp3.mp3"></audio>

    <input
        type="range"
        id="progress"
        value="0"
        min="0"
        max="100">

    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>

    <div class="volume">
        <label>🔊</label>

        <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.1"
            value="1">
    </div>

</div>

<script src="task4.js"></script>

</body>
</html>
